<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXELARIS Tickets | Venta</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{font-family:Poppins,sans-serif;background:#030712;color:#E5E7EB}.hero{background:radial-gradient(circle at top left,#7C3AED55,transparent 34%),radial-gradient(circle at bottom right,#2563EB55,transparent 38%),#030712}.glass{background:rgba(15,23,42,.82);border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(18px)}.input{width:100%;background:#0F172A;border:1px solid rgba(255,255,255,.12);color:white;outline:none;border-radius:18px;padding:14px 16px;font-weight:700}.input:focus{border-color:#7C3AED;box-shadow:0 0 0 4px rgba(124,58,237,.16)}.label{display:block;color:#CBD5E1;font-size:13px;font-weight:900;margin-bottom:8px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:16px;padding:12px 16px;font-weight:900;font-size:14px;text-decoration:none;transition:.2s}.btn-primary{background:linear-gradient(135deg,#7C3AED,#2563EB);color:white}.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(124,58,237,.28)}.btn-primary:disabled{opacity:.55;cursor:not-allowed}.ticket-card{border-radius:26px;padding:22px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10)}.counter-btn{width:42px;height:42px;border-radius:14px;background:#EEF2FF;color:#4F46E5;font-size:24px;font-weight:900}.counter-value{min-width:44px;text-align:center;font-size:28px;font-weight:900;color:white}.badge{display:inline-flex;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:900}.badge-green{background:#DCFCE7;color:#166534}.badge-yellow{background:#FEF3C7;color:#92400E}.badge-blue{background:#DBEAFE;color:#1D4ED8}.result{border-radius:22px;background:#ECFDF5;color:#064E3B;border:1px solid #A7F3D0;padding:18px}
</style>
</head>
<body class="hero min-h-screen">
<main class="max-w-6xl mx-auto px-5 py-8">
<header class="mb-8 grid lg:grid-cols-[1fr_320px] gap-6 items-center"><div><div class="text-sm tracking-[.28em] text-purple-300 font-bold">EXELARIS TICKETS</div><h1 id="eventoNombre" class="text-4xl lg:text-6xl font-black text-white mt-2">Cargando evento...</h1><p id="eventoInfo" class="text-slate-300 mt-4 text-lg"></p></div><div id="flyerBox" class="glass rounded-3xl overflow-hidden min-h-[260px] flex items-center justify-center text-slate-400 font-bold">Flyer</div></header>
<section class="grid lg:grid-cols-[1fr_380px] gap-6"><div class="glass rounded-3xl p-6"><h2 class="text-2xl font-black text-white mb-5">Selecciona tus boletos</h2><div id="categorias" class="grid gap-4 mb-8"></div><h2 class="text-2xl font-black text-white mb-5">Datos del comprador</h2><div class="grid md:grid-cols-3 gap-4 mb-6"><div><label class="label">Nombre</label><input id="nombre" class="input" placeholder="Nombre completo"></div><div><label class="label">Correo</label><input id="correo" class="input" placeholder="correo@email.com"></div><div><label class="label">WhatsApp</label><input id="telefono" class="input" placeholder="9210000000"></div></div><label class="ticket-card flex gap-3 items-start mb-6"><input id="compradorAsistente" type="checkbox" checked onchange="renderAsistentes()" class="mt-1 w-5 h-5 accent-purple-600"><span><strong class="text-white">El comprador usará el primer boleto</strong><small class="block text-slate-400 mt-1">El primer boleto quedará a nombre del comprador.</small></span></label><h2 class="text-2xl font-black text-white mb-5">Asistentes</h2><div id="asistentes" class="grid gap-3 mb-6"></div><button id="btnComprar" onclick="comprar()" class="btn btn-primary w-full">Generar boletos</button></div><aside class="glass rounded-3xl p-6 h-fit sticky top-6"><h2 class="text-2xl font-black text-white mb-5">Resumen</h2><div id="resumen" class="space-y-4"></div><div id="resultado" class="mt-6 space-y-3"></div></aside></section>
</main>
<script>
const API='https://fiestaretro-api.onrender.com';let config=null,cantidades={},asistentes=[];function dinero(v){return Number(v||0).toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0})}function esc(t){return String(t||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}function esGrupo(c){return c.tipoVenta==='grupo'||Number(c.boletosPorUnidad)>1}function getCats(){return config?.categorias||[]}async function cargar(){try{const r=await fetch(`${API}/api/boletos/config`),d=await r.json();if(!d.success)throw new Error(d.error);config=d;getCats().forEach(c=>cantidades[c.id]=0);document.getElementById('eventoNombre').textContent=d.evento.nombre;document.getElementById('eventoInfo').textContent=`${d.evento.fecha||''} · ${d.evento.hora||''} · ${d.evento.lugar||''} · ${d.evento.ciudad||''}`;if(d.evento.flyer){document.getElementById('flyerBox').innerHTML=`<img src="${d.evento.flyer}" class="w-full h-full object-cover">`;}renderCategorias();renderResumen();renderAsistentes();}catch(e){document.getElementById('eventoNombre').textContent=e.message}}
function esGeneral(c){
    return String(c.id || '').toLowerCase() === 'general' ||
           String(c.nombre || '').toLowerCase().includes('general');
}

function disponibilidadTexto(c){
    /*
    General:
    No mostrar cantidad exacta de boletos disponibles.
    */
    if(esGeneral(c)){
        if(c.disponiblesBoletos !== null && Number(c.disponiblesBoletos) <= 0){
            return 'Agotado';
        }

        return 'Disponible';
    }

    /*
    VIP 1 / VIP 2:
    Sí mostrar cuántas periqueras o salas quedan.
    */
    if(esGrupo(c)){
        if(c.disponiblesUnidades !== null && Number(c.disponiblesUnidades) <= 0){
            return `${c.unidad || 'unidades'} agotadas`;
        }

        return c.disponiblesUnidades === null
            ? 'Disponible'
            : `${c.disponiblesUnidades} ${c.unidad || 'unidades'} disponibles`;
    }

    /*
    Cualquier otra categoría individual futura.
    */
    if(c.disponiblesBoletos !== null && Number(c.disponiblesBoletos) <= 0){
        return 'Agotado';
    }

    return c.disponiblesBoletos === null
        ? 'Disponible'
        : `${c.disponiblesBoletos} boletos disponibles`;
}

function renderCategorias(){document.getElementById('categorias').innerHTML=getCats().filter(c=>c.activo).map(c=>{const grupo=esGrupo(c),label=grupo?`${c.unidad||'Unidad'} completa`:'Boleto individual',totalUnidad=grupo?Number(c.boletosPorUnidad||1)*Number(c.precio||0):Number(c.precio||0);return `<div class="ticket-card"><div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"><div><div class="flex gap-2 items-center flex-wrap"><h3 class="text-2xl font-black text-white">${esc(c.nombre)}</h3><span class="badge ${grupo?'badge-yellow':'badge-blue'}">${esc(label)}</span></div><p class="text-slate-400 mt-1">${esc(c.descripcion||'')}</p><div class="text-slate-300 font-bold mt-2">${dinero(c.precio)} por persona ${grupo?`· ${dinero(totalUnidad)} por ${esc(c.unidad)}`:''}</div><div class="text-green-300 font-black mt-1">${esc(disponibilidadTexto(c))}</div></div><div class="flex items-center gap-3"><button class="counter-btn" onclick="cambiar('${esc(c.id)}',-1)">-</button><div id="cant_${esc(c.id)}" class="counter-value">${cantidades[c.id]||0}</div><button class="counter-btn" onclick="cambiar('${esc(c.id)}',1)">+</button></div></div></div>`}).join('')}
function cambiar(id,delta){const c=getCats().find(x=>x.id===id);if(!c)return;let nuevo=Math.max(0,Number(cantidades[id]||0)+delta);if(esGrupo(c)&&c.disponiblesUnidades!==null&&nuevo>c.disponiblesUnidades){alert(`Solo quedan ${c.disponiblesUnidades} ${c.unidad}`);return}if(!esGrupo(c)&&c.disponiblesBoletos!==null&&nuevo>c.disponiblesBoletos){alert(`Solo quedan ${c.disponiblesBoletos} boletos`);return}cantidades[id]=nuevo;document.getElementById(`cant_${id}`).textContent=nuevo;renderResumen();renderAsistentes()}
function generarSlots(){const slots=[];getCats().forEach(c=>{const cant=Number(cantidades[c.id]||0);if(cant<=0)return;if(esGrupo(c)){for(let u=1;u<=cant;u++){for(let p=1;p<=Number(c.boletosPorUnidad||1);p++){slots.push({categoriaId:c.id,categoriaNombre:c.nombre,label:`${c.nombre} · ${c.unidad} ${u} · Lugar ${p}/${c.boletosPorUnidad}`})}}}else{for(let i=1;i<=cant;i++)slots.push({categoriaId:c.id,categoriaNombre:c.nombre,label:`${c.nombre} · Boleto ${i}`})}});return slots}
function renderResumen(){const slots=generarSlots();let total=0,rows=[];getCats().forEach(c=>{const cant=Number(cantidades[c.id]||0);if(cant<=0)return;const boletos=esGrupo(c)?cant*Number(c.boletosPorUnidad||1):cant,importe=boletos*Number(c.precio||0);total+=importe;rows.push(`<div class="flex justify-between border-b border-white/10 pb-3"><span class="text-slate-400">${esc(c.nombre)} ${esGrupo(c)?`(${cant} ${esc(c.unidad)})`:''}</span><strong class="text-white">${boletos} · ${dinero(importe)}</strong></div>`)});document.getElementById('resumen').innerHTML=(rows.join('')||'<div class="text-slate-400 font-bold">Sin boletos seleccionados.</div>')+`<div class="flex justify-between text-2xl pt-2"><span class="font-black text-white">Total</span><strong class="text-purple-300">${dinero(total)}</strong></div><div class="text-slate-400 font-bold">Boletos: ${slots.length}</div>`}
function renderAsistentes(){const cont=document.getElementById('asistentes'),slots=generarSlots(),comprador=document.getElementById('nombre').value.trim(),usar=document.getElementById('compradorAsistente').checked;if(slots.length===0){cont.innerHTML='<div class="text-slate-400 font-bold">Selecciona boletos para capturar asistentes.</div>';asistentes=[];return}asistentes=slots.map((s,i)=>{const previo=asistentes[i]||{};return{slot:s,nombre:i===0&&usar?comprador:(previo.nombre||''),bloqueado:i===0&&usar}});cont.innerHTML=asistentes.map((a,i)=>`<div class="ticket-card"><label class="label">${esc(a.slot.label)}</label><input class="input" ${a.bloqueado?'disabled':''} value="${esc(a.nombre)}" placeholder="${a.bloqueado?'Se usará el nombre del comprador':'Nombre del asistente'}" oninput="asistentes[${i}].nombre=this.value.trim()">${a.bloqueado?'<div class="text-green-300 text-sm font-bold mt-2">Este boleto queda a nombre del comprador.</div>':''}</div>`).join('')}
document.addEventListener('input',e=>{if(e.target.id==='nombre')renderAsistentes()});function payload(){return{comprador:{nombre:document.getElementById('nombre').value.trim(),correo:document.getElementById('correo').value.trim(),telefono:document.getElementById('telefono').value.trim()},seleccion:getCats().map(c=>({categoriaId:c.id,cantidad:Number(cantidades[c.id]||0)})).filter(x=>x.cantidad>0),asistentes:asistentes.map(a=>({nombre:a.nombre||document.getElementById('nombre').value.trim()}))}}
async function comprar(){const p=payload();if(!p.comprador.nombre){alert('Captura nombre');return}if(!p.comprador.correo){alert('Captura correo');return}if(p.seleccion.length===0){alert('Selecciona boletos');return}const btn=document.getElementById('btnComprar'),out=document.getElementById('resultado');try{btn.disabled=true;btn.textContent='Generando boletos...';out.innerHTML='';const r=await fetch(`${API}/api/boletos/comprar`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}),d=await r.json();if(!d.success)throw new Error(d.error);out.innerHTML=`<div class="result"><div class="font-black text-lg">Compra generada</div><div>Compra: <strong>${esc(d.compraId)}</strong></div><div>Total: <strong>${dinero(d.total)}</strong></div><div>Correo: <strong>${d.correo?.enviado?'Enviado':'Pendiente'}</strong></div></div>`+d.boletos.map(b=>`<div class="result"><strong>${esc(b.folio)}</strong> · ${esc(b.categoriaNombre)}<br><small>${esc(b.nombre)}</small><div class="mt-3"><a class="btn btn-primary" target="_blank" href="${b.pdfUrl}">Abrir PDF</a></div></div>`).join('');await cargar();}catch(e){alert(e.message)}finally{btn.disabled=false;btn.textContent='Generar boletos'}}cargar();
</script>
</body>
</html>
