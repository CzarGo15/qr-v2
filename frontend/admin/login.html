<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXELARIS Admin | Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{font-family:Poppins,sans-serif;background:radial-gradient(circle at top left,#7C3AED55,transparent 34%),radial-gradient(circle at bottom right,#2563EB55,transparent 38%),#020617;color:#E5E7EB}.glass{background:rgba(15,23,42,.90);border:1px solid rgba(255,255,255,.12);box-shadow:0 28px 90px rgba(0,0,0,.45);backdrop-filter:blur(18px)}.input{width:100%;background:#0F172A;border:1px solid rgba(255,255,255,.14);color:white;outline:none;border-radius:18px;padding:14px 16px;font-weight:800}.label{display:block;color:#CBD5E1;font-size:13px;font-weight:900;margin-bottom:8px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:16px;padding:12px 16px;font-weight:900;text-decoration:none}.btn-primary{background:linear-gradient(135deg,#7C3AED,#2563EB);color:white}.btn-soft{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);color:#E5E7EB}.msg{border-radius:16px;padding:12px 14px;font-weight:800}.ok{background:#DCFCE7;color:#166534}.bad{background:#FEE2E2;color:#991B1B}
</style>
</head>
<body>
<main class="min-h-screen flex items-center justify-center p-5">
<div class="glass rounded-[32px] p-7 w-full max-w-md">
<div class="text-sm tracking-[.28em] text-purple-300 font-bold">EXELARIS ADMIN</div>
<h1 class="text-4xl font-black text-white mt-2">Iniciar sesión</h1>
<p class="text-slate-400 mt-2">Acceso protegido para administración, taquilla y validadores.</p>

<div class="mt-7 space-y-4">
<div><label class="label">Usuario o correo</label><input id="usuario" class="input" placeholder="admin"></div>
<div><label class="label">Contraseña</label><input id="password" class="input" type="password" placeholder="••••••"></div>
<button id="btnLogin" onclick="login()" class="btn btn-primary w-full">Entrar</button>
<div id="msg"></div>
</div>

<div class="mt-6 border-t border-white/10 pt-5">
<button onclick="toggleRecovery()" class="text-purple-300 font-black text-sm">Olvidé mi contraseña</button>
<div id="recovery" class="hidden mt-4 space-y-3">
<input id="recUsuario" class="input" placeholder="Usuario o correo">
<button class="btn btn-soft w-full" onclick="enviarCodigo()">Enviar código</button>
<input id="recCodigo" class="input" placeholder="Código recibido">
<input id="recNueva" class="input" type="password" placeholder="Nueva contraseña">
<button class="btn btn-primary w-full" onclick="resetPassword()">Cambiar contraseña</button>
</div>
</div>

<div class="mt-6 text-center">
<a href="setup.html" class="text-slate-400 text-sm font-bold">Primera instalación</a>
</div>
</div>
</main>
<script>
const API='https://fiestaretro-api.onrender.com';
function qs(k){return new URLSearchParams(location.search).get(k)}
function show(text,ok=false){document.getElementById('msg').innerHTML=`<div class="msg ${ok?'ok':'bad'}">${text}</div>`}
function toggleRecovery(){document.getElementById('recovery').classList.toggle('hidden')}
async function login(){
const usuario=document.getElementById('usuario').value.trim();
const password=document.getElementById('password').value.trim();
const btn=document.getElementById('btnLogin');
if(!usuario||!password){show('Captura usuario y contraseña');return}
try{
btn.disabled=true;btn.textContent='Entrando...';
const r=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario,password})});
const d=await r.json(); if(!d.success)throw new Error(d.error);
localStorage.setItem('exelaris_admin_token',d.token);
localStorage.setItem('exelaris_admin_user',JSON.stringify(d.user));
location.href=qs('redirect')||'inventario.html';
}catch(e){show(e.message)}finally{btn.disabled=false;btn.textContent='Entrar'}
}
async function enviarCodigo(){
const usuario=document.getElementById('recUsuario').value.trim();
if(!usuario){show('Captura usuario o correo');return}
try{const r=await fetch(`${API}/api/auth/forgot-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario})});const d=await r.json();if(!d.success)throw new Error(d.error);show(d.message,true)}catch(e){show(e.message)}
}
async function resetPassword(){
const usuario=document.getElementById('recUsuario').value.trim();
const codigo=document.getElementById('recCodigo').value.trim();
const nueva=document.getElementById('recNueva').value.trim();
if(!usuario||!codigo||!nueva){show('Captura usuario, código y nueva contraseña');return}
try{const r=await fetch(`${API}/api/auth/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({usuario,codigo,nueva})});const d=await r.json();if(!d.success)throw new Error(d.error);show('Contraseña cambiada. Ya puedes iniciar sesión.',true)}catch(e){show(e.message)}
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')login()});
</script>
</body>
</html>
