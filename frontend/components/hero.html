<div class="hero">

    <div class="hero-bg" data-hero-bg></div>

    <nav class="hero-nav">
        <div class="container-ex hero-nav-inner">

            <div class="brand">
                <div class="brand-mark">E</div>
                <div class="brand-text">
                    <strong>EXELARIS</strong>
                    <span>EVENT MANAGEMENT</span>
                </div>
            </div>

            <div class="nav-links">
                <a href="#evento">Evento</a>
                <a href="#boletos">Boletos</a>
                <a href="#comprador">Comprar</a>
            </div>

        </div>
    </nav>

    <div class="container-ex hero-content">

        <div class="hero-badge">
            🎟 Venta oficial
        </div>

        <h1 class="hero-title">
            <span data-evento-nombre>Evento EXELARIS</span>
        </h1>

        <div class="hero-meta">
            <div class="hero-meta-item">
                📅 <span data-evento-fecha></span>
            </div>

            <div class="hero-meta-item">
                🕒 <span data-evento-hora></span>
            </div>

            <div class="hero-meta-item">
                📍 <span data-evento-ciudad></span>
            </div>
        </div>

        <div class="hero-actions">
            <button class="btn-primary" onclick="irACompra()">
                Comprar boletos
            </button>

            <a href="#evento" class="btn-secondary">
                Ver detalles
            </a>
        </div>

    </div>

    <div class="hero-scroll">
        Scroll
    </div>

</div>
