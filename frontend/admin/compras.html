<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXELARIS Admin | Compras</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:#020617;color:#E5E7EB}
.glass{background:rgba(15,23,42,.86);border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 80px rgba(0,0,0,.32);backdrop-filter:blur(18px)}
.badge{display:inline-flex;align-items:center;justify-content:center;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:800;white-space:nowrap}
.badge-green{background:#DCFCE7;color:#166534}
.badge-yellow{background:#FEF3C7;color:#92400E}
.badge-blue{background:#DBEAFE;color:#1D4ED8}
.badge-red{background:#FEE2E2;color:#991B1B}
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:14px;padding:10px 14px;font-weight:800;font-size:13px;transition:.2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#7C3AED,#2563EB);color:white}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 32px rgba(124,58,237,.26)}
.btn-soft{background:rgba(255,255,255,.08);color:#E5E7EB;border:1px solid rgba(255,255,255,.10)}
.btn-soft:hover{background:rgba(255,255,255,.14)}
.input{width:100%;background:#0F172A;border:1px solid rgba(255,255,255,.12);color:white;outline:none;border-radius:18px;padding:14px 16px;font-weight:600}
.input:focus{border-color:#7C3AED;box-shadow:0 0 0 4px rgba(124,58,237,.16)}
.table-wrap{overflow:auto;border-radius:22px;border:1px solid rgba(255,255,255,.10)}
table{width:100%;border-collapse:collapse;min-width:900px}
th{background:#0F172A;color:#94A3B8;font-size:12px;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:16px;white-space:nowrap}
td{padding:16px;border-top:1px solid rgba(255,255,255,.08);vertical-align:top}
tr:hover td{background:rgba(255,255,255,.03)}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.70);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{width:min(980px,96vw);max-height:90vh;overflow:auto;border-radius:28px}
.summary-box{border-radius:22px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:18px}
.summary-label{color:#94A3B8;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.summary-value{color:#FFFFFF;font-size:20px;font-weight:900;margin-top:6px;word-break:break-word}
@media print{
body *{visibility:hidden}
#printArea,#printArea *{visibility:visible}
#printArea{position:absolute;left:0;top:0;width:100%;background:white;color:black}
.no-print{display:none!important}
.summary-box{border:1px solid #ddd;background:white}
.summary-label,.summary-value{color:black}
}
</style>

<script>
window.EXELARIS_ALLOWED_ROLES=['admin','taquilla'];
</script>
<script src="admin-auth.js"></script>
  
</head>
<body>
<main class="max-w-7xl mx-auto px-5 py-8">
<header class="mb-8 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
<div>
<div class="text-sm tracking-[.28em] text-purple-300 font-bold">EXELARIS ADMIN</div>
<h1 class="text-4xl lg:text-5xl font-black tracking-tight text-white mt-2">Compras / Taquilla</h1>
<p class="text-slate-400 mt-3 max-w-2xl">Consulta compras, abre PDFs, imprime boletos físicos y reenvía confirmaciones por correo.</p>
</div>
<div class="flex flex-wrap gap-3">
<a href="../index.html" class="btn btn-soft">Ver venta pública</a>
<button onclick="cargarCompras()" class="btn btn-primary">Actualizar</button>
</div>
</header>
<section class="grid md:grid-cols-4 gap-4 mb-6">
<div class="glass rounded-3xl p-5"><div class="text-slate-400 text-sm font-bold">Compras</div><div id="statCompras" class="text-3xl font-black mt-2">0</div></div>
<div class="glass rounded-3xl p-5"><div class="text-slate-400 text-sm font-bold">Boletos</div><div id="statBoletos" class="text-3xl font-black mt-2">0</div></div>
<div class="glass rounded-3xl p-5"><div class="text-slate-400 text-sm font-bold">Ventas</div><div id="statVentas" class="text-3xl font-black mt-2">$0</div></div>
<div class="glass rounded-3xl p-5"><div class="text-slate-400 text-sm font-bold">Correos enviados</div><div id="statCorreos" class="text-3xl font-black mt-2">0</div></div>
</section>
<section class="glass rounded-3xl p-5 mb-6">
<div class="grid lg:grid-cols-[1fr_auto] gap-3">
<input id="busqueda" class="input" placeholder="Buscar por compra, nombre, correo, teléfono, folio...">
<div class="flex gap-3">
<button onclick="cargarCompras()" class="btn btn-primary">Buscar</button>
<button onclick="limpiarBusqueda()" class="btn btn-soft">Limpiar</button>
</div>
</div>
</section>
<section class="glass rounded-3xl p-5">
<div class="table-wrap">
<table>
<thead><tr><th>Compra</th><th>Cliente</th><th>Boletos</th><th>Total</th><th>Correo</th><th>Fecha</th><th>Acciones</th></tr></thead>
<tbody id="tablaCompras"><tr><td colspan="7">Cargando compras...</td></tr></tbody>
</table>
</div>
</section>
</main>
<div id="modalDetalle" class="modal-backdrop">
<div class="modal glass">
<div class="p-6 border-b border-white/10 flex items-start justify-between gap-4 no-print">
<div>
<div class="text-sm text-purple-300 tracking-[.22em] font-bold">DETALLE DE COMPRA</div>
<h2 id="modalTitulo" class="text-2xl font-black text-white mt-1">COMP-000000</h2>
</div>
<button onclick="cerrarModal()" class="btn btn-soft">Cerrar</button>
</div>
<div id="printArea" class="p-6"><div id="detalleContenido"></div></div>
</div>
</div>
<script>
const API = 'https://fiestaretro-api.onrender.com';
let comprasCache = [];
let detalleActual = null;
function dinero(valor){return Number(valor||0).toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0});}
function fecha(valor){if(!valor)return '-';try{return new Date(valor).toLocaleString('es-MX');}catch{return valor;}}
function escapar(texto){return String(texto||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;");}
function obtenerTotalCompra(compra, boletos=[]){
if(compra.total!==undefined&&compra.total!==null)return Number(compra.total||0);
if(compra.importe!==undefined&&compra.importe!==null)return Number(compra.importe||0);
if(compra.subtotal!==undefined&&compra.subtotal!==null)return Number(compra.subtotal||0);
return boletos.reduce((sum,boleto)=>sum+Number(boleto.precio||0),0);
}
function obtenerCantidadCompra(compra, boletos=[]){
if(compra.cantidad!==undefined&&compra.cantidad!==null)return Number(compra.cantidad||0);
if(Array.isArray(compra.boletos))return compra.boletos.length;
return boletos.length;
}
function obtenerEventoCompra(compra, boletos=[]){return compra.eventoNombre||boletos[0]?.eventoNombre||'Evento EXELARIS';}
function badgeCorreo(compra){
if(compra.correoEnviado)return '<span class="badge badge-green">Enviado</span>';
if(compra.correoReenviado)return '<span class="badge badge-blue">Reenviado</span>';
if(compra.correoError)return '<span class="badge badge-red">Error</span>';
return '<span class="badge badge-yellow">Pendiente</span>';
}
function badgeEstado(estado){return estado==='usado'?'<span class="badge badge-red">Usado</span>':'<span class="badge badge-green">Activo</span>';}
function badgeImpreso(boleto){return boleto.impreso?'<span class="badge badge-blue">Impreso</span>':'<span class="badge badge-yellow">No impreso</span>';}
async function cargarCompras(){
const tbody=document.getElementById('tablaCompras');
const q=document.getElementById('busqueda').value.trim();
tbody.innerHTML='<tr><td colspan="7">Cargando compras...</td></tr>';
try{
const url=q?`${API}/api/compras?q=${encodeURIComponent(q)}&limit=200`:`${API}/api/compras?limit=200`;
const response=await fetch(url);
const data=await response.json();
if(!data.success)throw new Error(data.error||'Error al cargar compras');
comprasCache=data.compras||[];
renderCompras();
renderStats();
}catch(error){
console.error(error);
tbody.innerHTML=`<tr><td colspan="7" class="text-red-300 font-bold">${escapar(error.message)}</td></tr>`;
}
}
function renderStats(){
const totalCompras=comprasCache.length;
const totalBoletos=comprasCache.reduce((sum,compra)=>sum+obtenerCantidadCompra(compra),0);
const totalVentas=comprasCache.reduce((sum,compra)=>sum+obtenerTotalCompra(compra),0);
const correos=comprasCache.filter(compra=>compra.correoEnviado).length;
document.getElementById('statCompras').textContent=totalCompras;
document.getElementById('statBoletos').textContent=totalBoletos;
document.getElementById('statVentas').textContent=dinero(totalVentas);
document.getElementById('statCorreos').textContent=correos;
}
function renderCompras(){
const tbody=document.getElementById('tablaCompras');
if(comprasCache.length===0){tbody.innerHTML='<tr><td colspan="7">No se encontraron compras.</td></tr>';return;}
tbody.innerHTML=comprasCache.map(compra=>{
const cantidad=obtenerCantidadCompra(compra);
const total=obtenerTotalCompra(compra);
const evento=obtenerEventoCompra(compra);
return `
<tr>
<td><strong class="text-white">${escapar(compra.compraId)}</strong><br><span class="text-slate-400 text-sm">${escapar(evento)}</span></td>
<td><strong>${escapar(compra.compradorNombre)}</strong><br><span class="text-slate-400 text-sm">${escapar(compra.compradorCorreo||'')}</span><br><span class="text-slate-500 text-sm">${escapar(compra.compradorTelefono||'')}</span></td>
<td><strong>${cantidad}</strong><br><span class="text-slate-400 text-sm">${(compra.folios||[]).slice(0,3).map(escapar).join(', ')}${(compra.folios||[]).length>3?'...':''}</span></td>
<td><strong>${dinero(total)}</strong><br><span class="text-slate-400 text-sm">${escapar(compra.estadoPago||'generado')}</span></td>
<td>${badgeCorreo(compra)}</td>
<td><span class="text-sm">${fecha(compra.fechaCompra)}</span></td>
<td><button class="btn btn-primary" onclick="verCompra('${escapar(compra.compraId)}')">Ver / Imprimir</button></td>
</tr>`;
}).join('');
}
function limpiarBusqueda(){document.getElementById('busqueda').value='';cargarCompras();}
async function verCompra(compraId){
try{
const response=await fetch(`${API}/api/compras/${compraId}`);
const data=await response.json();
if(!data.success)throw new Error(data.error||'No se pudo cargar la compra');
detalleActual=data;
document.getElementById('modalTitulo').textContent=compraId;
renderDetalle(data.compra,data.boletos||[]);
document.getElementById('modalDetalle').style.display='flex';
}catch(error){console.error(error);alert(error.message);}
}
function renderDetalle(compra,boletos){
const cont=document.getElementById('detalleContenido');
const total=obtenerTotalCompra(compra,boletos);
const cantidad=obtenerCantidadCompra(compra,boletos);
const evento=obtenerEventoCompra(compra,boletos);
const correo=compra.compradorCorreo||boletos[0]?.compradorCorreo||'';
const telefono=compra.compradorTelefono||boletos[0]?.compradorTelefono||'';
const comprador=compra.compradorNombre||boletos[0]?.compradorNombre||'Sin comprador';
cont.innerHTML=`
<div class="mb-6">
<h3 class="text-2xl font-black text-white mb-2">${escapar(compra.compraId)}</h3>
<div class="grid md:grid-cols-2 gap-4 text-sm mb-5">
<div class="summary-box">
<div class="summary-label">Comprador</div>
<div class="summary-value">${escapar(comprador)}</div>
<div class="text-slate-300 mt-2">${escapar(correo)}</div>
<div class="text-slate-400">${escapar(telefono)}</div>
</div>
<div class="summary-box">
<div class="summary-label">Resumen de compra</div>
<div class="grid grid-cols-2 gap-3 mt-3">
<div><div class="text-slate-400 text-xs font-bold">Evento</div><div class="text-white font-bold">${escapar(evento)}</div></div>
<div><div class="text-slate-400 text-xs font-bold">Total</div><div class="text-white font-bold">${dinero(total)}</div></div>
<div><div class="text-slate-400 text-xs font-bold">Boletos</div><div class="text-white font-bold">${cantidad}</div></div>
<div><div class="text-slate-400 text-xs font-bold">Correo</div><div>${badgeCorreo(compra)}</div></div>
</div>
</div>
</div>
</div>
<div class="flex flex-wrap gap-3 mb-5 no-print">
<button onclick="window.print()" class="btn btn-primary">Imprimir resumen</button>
<button onclick="reenviarCorreo('${escapar(compra.compraId)}')" class="btn btn-soft">Reenviar correo</button>
</div>
<div class="table-wrap">
<table>
<thead><tr><th>Folio</th><th>Titular</th><th>Tipo</th><th>Estado</th><th>Impresión</th><th>Acciones</th></tr></thead>
<tbody>
${boletos.map(boleto=>`
<tr>
<td><strong>${escapar(boleto.folio)}</strong><br><span class="text-slate-400 text-xs">${escapar(boleto.uuid)}</span></td>
<td>${escapar(boleto.nombre)}</td>
<td><span class="badge ${boleto.tipo==='VIP'?'badge-yellow':'badge-blue'}">${escapar(boleto.tipo)}</span></td>
<td>${badgeEstado(boleto.estado)}</td>
<td>${badgeImpreso(boleto)}<br><span class="text-slate-400 text-xs">${boleto.fechaImpresion?fecha(boleto.fechaImpresion):''}</span></td>
<td><div class="flex flex-wrap gap-2"><a href="${boleto.pdfUrl}" target="_blank" class="btn btn-primary">Abrir PDF</a><button onclick="imprimirBoleto('${escapar(boleto.uuid)}','${escapar(boleto.pdfUrl)}')" class="btn btn-soft">Marcar impreso</button></div></td>
</tr>`).join('')}
</tbody>
</table>
</div>`;
}
async function imprimirBoleto(uuid,pdfUrl){
const confirmar=confirm('¿Marcar este boleto como impreso?');
if(!confirmar)return;
try{
const response=await fetch(`${API}/api/compras/boletos/${uuid}/impreso`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({impresoPor:'Administrador'})});
const data=await response.json();
if(!data.success)throw new Error(data.error||'No se pudo marcar como impreso');
window.open(pdfUrl,'_blank');
if(detalleActual?.compra?.compraId){await verCompra(detalleActual.compra.compraId);}
}catch(error){console.error(error);alert(error.message);}
}
async function reenviarCorreo(compraId){
const confirmar=confirm('¿Reenviar correo al comprador?');
if(!confirmar)return;
try{
const response=await fetch(`${API}/api/compras/${compraId}/reenviar-correo`,{method:'POST'});
const data=await response.json();
if(!data.success)throw new Error(data.error||'No se pudo reenviar el correo');
alert('Correo reenviado correctamente');
await verCompra(compraId);
}catch(error){console.error(error);alert(error.message);}
}
function cerrarModal(){document.getElementById('modalDetalle').style.display='none';}
document.getElementById('busqueda').addEventListener('keydown',event=>{if(event.key==='Enter')cargarCompras();});
cargarCompras();
</script>
<script src="admin-nav.js"></script>
</body>
</html>
