<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXELARIS Admin | Taquilla Categorías</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}body{font-family:Poppins,sans-serif;background:#020617;color:#E5E7EB}.glass{background:rgba(15,23,42,.86);border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 80px rgba(0,0,0,.32);backdrop-filter:blur(18px)}.input,.select{width:100%;background:#0F172A;border:1px solid rgba(255,255,255,.12);color:white;outline:none;border-radius:18px;padding:14px 16px;font-weight:700}.label{display:block;color:#CBD5E1;font-size:13px;font-weight:900;margin-bottom:8px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:16px;padding:12px 16px;font-weight:900;font-size:14px;transition:.2s;text-decoration:none}.btn-primary{background:linear-gradient(135deg,#7C3AED,#2563EB);color:white}.btn-primary:disabled{opacity:.55}.btn-soft{background:rgba(255,255,255,.08);color:#E5E7EB;border:1px solid rgba(255,255,255,.10)}.card{border-radius:24px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);padding:18px}.counter-btn{width:42px;height:42px;border-radius:14px;background:#EEF2FF;color:#4F46E5;font-size:24px;font-weight:900}.counter-value{min-width:44px;text-align:center;font-size:28px;font-weight:900;color:white}.result{border-radius:22px;background:#ECFDF5;color:#064E3B;border:1px solid #A7F3D0;padding:18px}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900}.badge-blue{background:#DBEAFE;color:#1D4ED8}.badge-yellow{background:#FEF3C7;color:#92400E}.badge-green{background:#DCFCE7;color:#166534}
</style>
</head>
<body>
<main class="max-w-6xl mx-auto px-5 py-8">
<header class="mb-8 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5"><div><div class="text-sm tracking-[.28em] text-purple-300 font-bold">EXELARIS ADMIN</div><h1 class="text-4xl lg:text-5xl font-black text-white mt-2">Venta en Taquilla</h1><p class="text-slate-400 mt-3">Venta presencial con categorías dinámicas e inventario.</p></div><div class="flex flex-wrap gap-3"><a href="compras.html" class="btn btn-soft">Compras</a><a href="lotes.html" class="btn btn-soft">Lotes físicos</a><a href="../venta.html" class="btn btn-soft">Venta pública</a></div></header>
<section class="grid lg:grid-cols-[1fr_380px] gap-6"><div class="glass rounded-3xl p-6"><h2 class="text-2xl font-black text-white mb-6">Nueva venta</h2><div id="eventoBox" class="card mb-6">Cargando evento...</div><div id="categorias" class="grid gap-4 mb-8"></div><h2 class="text-2xl font-black text-white mb-5">Comprador</h2><div class="grid md:grid-cols-3 gap-4 mb-6"><div><label class="label">Nombre</label><input id="nombre" class="input" placeholder="Nombre comprador"></div><div><label class="label">Correo</label><input id="correo" class="input" placeholder="Opcional"></div><div><label class="label">WhatsApp</label><input id="telefono" class="input" placeholder="Opcional"></div></div><div class="grid md:grid-cols-2 gap-4 mb-6"><div><label class="label">Método de pago</label><select id="metodoPago" class="select" onchange="renderResumen()"><option value="efectivo">Efectivo</option><option value="transferencia">Transferencia</option><option value="cortesia">Cortesía</option></select></div><div><label class="label">Vendedor</label><input id="vendedor" class="input" value="Administrador"></div></div><label class="card flex gap-3 items-start mb-6"><input id="compradorAsistente" type="checkbox" checked onchange="renderAsistentes()" class="mt-1 w-5 h-5 accent-purple-600"><span><strong class="text-white">El comprador usará el primer boleto</strong><small class="block text-slate-400 mt-1">El primer boleto queda a nombre del comprador.</small></span></label><h2 class="text-2xl font-black text-white mb-5">Asistentes</h2><div id="asistentes" class="grid gap-3 mb-6"></div><label class="card flex gap-3 items-start mb-6"><input id="enviarCorreo" type="checkbox" class="mt-1 w-5 h-5 accent-purple-600"><span><strong class="text-white">Enviar correo al comprador</strong><small class="block text-slate-400 mt-1">Requiere correo capturado.</small></span></label><button id="btnVender" onclick="vender()" class="btn btn-primary w-full">Generar venta de taquilla</button></div><aside class="glass rounded-3xl p-6 h-fit sticky top-6"><h2 class="text-2xl font-black text-white mb-5">Resumen</h2><div id="resumen" class="space-y-4"></div><div id="resultado" class="mt-6 space-y-3"></div></aside></section>
</main>
<script>
const API='https://fiestaretro-api.onrender.com';let config=null,cantidades={},asistentes=[];function dinero(v){return Number(v||0).toLocaleString('es-MX',{style:'currency',currency:'MXN',maximumFractionDigits:0})}function esc(t){return String(t||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}function esGrupo(c){return c.tipoVenta==='grupo'||Number(c.boletosPorUnidad)>1}function getCats(){return config?.categorias||[]}async function cargar(){try{const r=await fetch(`${API}/api/taquilla/config`),d=await r.json();if(!d.success)throw new Error(d.error);config=d;getCats().forEach(c=>cantidades[c.id]=0);document.getElementById('eventoBox').innerHTML=`<div class="text-slate-400 text-sm font-black">EVENTO ACTIVO</div><div class="text-2xl font-black text-white">${esc(d.evento.nombre)}</div><div class="text-slate-400">${esc(d.evento.fecha||'')} · ${esc(d.evento.hora||'')} · ${esc(d.evento.lugar||'')}</div>`;renderCategorias();renderResumen();renderAsistentes();}catch(e){document.getElementById('eventoBox').innerHTML=`<div class="text-red-300 font-black">${esc(e.message)}</div>`}}
function disp(c){if(esGrupo(c))return c.disponiblesUnidades===null?'Disponible':`${c.disponiblesUnidades} ${c.unidad||'unidades'} disponibles`;return c.disponiblesBoletos===null?'Disponible':`${c.disponiblesBoletos} boletos disponibles`}
function renderCategorias(){document.getElementById('categorias').innerHTML=getCats().filter(c=>c.activo).map(c=>{const grupo=esGrupo(c),totalUnidad=grupo?Number(c.boletosPorUnidad||1)*Number(c.precio||0):Number(c.precio||0);return `<div class="card"><div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4"><div><div class="flex gap-2 flex-wrap items-center"><h3 class="text-2xl font-black text-white">${esc(c.nombre)}</h3><span class="badge ${grupo?'badge-yellow':'badge-blue'}">${grupo?esc(c.unidad):'Individual'}</span></div><p class="text-slate-400 mt-1">${esc(c.descripcion||'')}</p><div class="text-slate-300 font-bold mt-2">${dinero(c.precio)} por persona ${grupo?`· ${dinero(totalUnidad)} por ${esc(c.unidad)}`:''}</div><div class="text-green-300 font-black mt-1">${esc(disp(c))}</div></div><div class="flex items-center gap-3"><button class="counter-btn" onclick="cambiar('${esc(c.id)}',-1)">-</button><div id="cant_${esc(c.id)}" class="counter-value">${cantidades[c.id]||0}</div><button class="counter-btn" onclick="cambiar('${esc(c.id)}',1)">+</button></div></div></div>`}).join('')}
function cambiar(id,delta){const c=getCats().find(x=>x.id===id);if(!c)return;let nuevo=Math.max(0,Number(cantidades[id]||0)+delta);if(esGrupo(c)&&c.disponiblesUnidades!==null&&nuevo>c.disponiblesUnidades){alert(`Solo quedan ${c.disponiblesUnidades} ${c.unidad}`);return}if(!esGrupo(c)&&c.disponiblesBoletos!==null&&nuevo>c.disponiblesBoletos){alert(`Solo quedan ${c.disponiblesBoletos} boletos`);return}cantidades[id]=nuevo;document.getElementById(`cant_${id}`).textContent=nuevo;renderResumen();renderAsistentes()}
function slots(){const arr=[];getCats().forEach(c=>{const cant=Number(cantidades[c.id]||0);if(cant<=0)return;if(esGrupo(c)){for(let u=1;u<=cant;u++){for(let p=1;p<=Number(c.boletosPorUnidad||1);p++){arr.push({categoriaId:c.id,label:`${c.nombre} · ${c.unidad} ${u} · Lugar ${p}/${c.boletosPorUnidad}`})}}}else{for(let i=1;i<=cant;i++)arr.push({categoriaId:c.id,label:`${c.nombre} · Boleto ${i}`})}});return arr}
function renderResumen(){let total=0,rows=[];const metodo=document.getElementById('metodoPago')?.value||'efectivo';getCats().forEach(c=>{const cant=Number(cantidades[c.id]||0);if(cant<=0)return;const boletos=esGrupo(c)?cant*Number(c.boletosPorUnidad||1):cant,importe=boletos*Number(c.precio||0);total+=importe;rows.push(`<div class="flex justify-between border-b border-white/10 pb-3"><span class="text-slate-400">${esc(c.nombre)} ${esGrupo(c)?`(${cant} ${esc(c.unidad)})`:''}</span><strong class="text-white">${boletos} · ${dinero(metodo==='cortesia'?0:importe)}</strong></div>`)});document.getElementById('resumen').innerHTML=(rows.join('')||'<div class="text-slate-400 font-bold">Sin boletos seleccionados.</div>')+`<div class="flex justify-between text-2xl pt-2"><span class="font-black text-white">Total</span><strong class="text-purple-300">${dinero(metodo==='cortesia'?0:total)}</strong></div><div class="text-slate-400 font-bold">Boletos: ${slots().length}</div>`}
function renderAsistentes(){const cont=document.getElementById('asistentes'),s=slots(),comprador=document.getElementById('nombre').value.trim(),usar=document.getElementById('compradorAsistente').checked;if(s.length===0){cont.innerHTML='<div class="text-slate-400 font-bold">Selecciona boletos.</div>';asistentes=[];return}asistentes=s.map((slot,i)=>{const prev=asistentes[i]||{};return{slot,nombre:i===0&&usar?comprador:(prev.nombre||''),bloqueado:i===0&&usar}});cont.innerHTML=asistentes.map((a,i)=>`<div class="card"><label class="label">${esc(a.slot.label)}</label><input class="input" ${a.bloqueado?'disabled':''} value="${esc(a.nombre)}" placeholder="${a.bloqueado?'Se usará el nombre del comprador':'Nombre asistente'}" oninput="asistentes[${i}].nombre=this.value.trim()"></div>`).join('')}
document.addEventListener('input',e=>{if(e.target.id==='nombre')renderAsistentes()});function payload(){return{comprador:{nombre:document.getElementById('nombre').value.trim(),correo:document.getElementById('correo').value.trim(),telefono:document.getElementById('telefono').value.trim()},metodoPago:document.getElementById('metodoPago').value,vendedor:document.getElementById('vendedor').value.trim()||'Administrador',enviarCorreo:document.getElementById('enviarCorreo').checked,seleccion:getCats().map(c=>({categoriaId:c.id,cantidad:Number(cantidades[c.id]||0)})).filter(x=>x.cantidad>0),asistentes:asistentes.map(a=>({nombre:a.nombre||document.getElementById('nombre').value.trim()}))}}
async function vender(){const p=payload();if(!p.comprador.nombre){alert('Captura nombre');return}if(p.enviarCorreo&&!p.comprador.correo){alert('Para enviar correo captura correo');return}if(p.seleccion.length===0){alert('Selecciona boletos');return}const btn=document.getElementById('btnVender'),out=document.getElementById('resultado');try{btn.disabled=true;btn.textContent='Generando...';out.innerHTML='';const r=await fetch(`${API}/api/taquilla/vender`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)}),d=await r.json();if(!d.success)throw new Error(d.error);out.innerHTML=`<div class="result"><div class="font-black text-lg">Venta generada</div><div>Compra: <strong>${esc(d.compraId)}</strong></div><div>Total: <strong>${dinero(d.total)}</strong></div></div>`+d.boletos.map(b=>`<div class="result"><strong>${esc(b.folio)}</strong> · ${esc(b.categoriaNombre)}<br><small>${esc(b.nombre)}</small><div class="mt-3 flex gap-2 flex-wrap"><a class="btn btn-primary" target="_blank" href="${b.pdfUrl}">Abrir PDF</a><button class="btn btn-soft" onclick="window.open('${b.pdfUrl}','_blank')">Imprimir</button></div></div>`).join('');await cargar();}catch(e){alert(e.message)}finally{btn.disabled=false;btn.textContent='Generar venta de taquilla'}}cargar();
</script>
<script src="admin-nav.js"></script>
</body>
</html>
