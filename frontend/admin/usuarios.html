<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXELARIS Admin | Usuarios</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>window.EXELARIS_ALLOWED_ROLES=['admin'];</script>
<script src="admin-auth.js"></script>
<style>*{box-sizing:border-box}body{font-family:Poppins,sans-serif;background:#020617;color:#E5E7EB}.glass{background:rgba(15,23,42,.88);border:1px solid rgba(255,255,255,.10);box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(18px)}.input,.select{width:100%;background:#0F172A;border:1px solid rgba(255,255,255,.14);color:white;outline:none;border-radius:18px;padding:14px 16px;font-weight:800}.label{display:block;color:#CBD5E1;font-size:13px;font-weight:900;margin-bottom:8px}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:16px;padding:12px 16px;font-weight:900;text-decoration:none}.btn-primary{background:linear-gradient(135deg,#7C3AED,#2563EB);color:white}.btn-soft{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.10);color:#E5E7EB}.btn-danger{background:#991B1B;color:#FEE2E2}.table-wrap{overflow:auto;border-radius:22px;border:1px solid rgba(255,255,255,.10)}table{width:100%;border-collapse:collapse;min-width:950px}th{background:#0F172A;color:#94A3B8;font-size:12px;text-transform:uppercase;letter-spacing:.08em;text-align:left;padding:14px;white-space:nowrap}td{padding:14px;border-top:1px solid rgba(255,255,255,.08);vertical-align:top}.badge{display:inline-flex;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:900}.badge-green{background:#DCFCE7;color:#166534}.badge-yellow{background:#FEF3C7;color:#92400E}.badge-red{background:#FEE2E2;color:#991B1B}.modal{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:9998;padding:18px}.modal-box{width:min(560px,96vw);background:white;color:#0F172A;border-radius:28px;padding:24px}</style>
</head>
<body>
<div id="modal" class="modal"><div class="modal-box"><h2 id="modalTitle" class="text-2xl font-black mb-4">Cambiar contraseña</h2><div id="modalBody"></div><div class="flex gap-3 mt-5"><button class="btn btn-primary flex-1" onclick="guardarModal()">Guardar</button><button class="btn btn-soft flex-1" style="color:#0F172A" onclick="cerrarModal()">Cancelar</button></div></div></div>
<main class="max-w-7xl mx-auto px-5 py-8">
<header class="mb-8 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5"><div><div class="text-sm tracking-[.28em] text-purple-300 font-bold">EXELARIS ADMIN</div><h1 class="text-4xl lg:text-5xl font-black text-white mt-2">Usuarios y contraseñas</h1><p class="text-slate-400 mt-3">Crea usuarios, cambia roles, desactiva accesos y restablece contraseñas.</p></div><div class="flex gap-3 flex-wrap"><a class="btn btn-soft" href="inventario.html">Dashboard</a><button class="btn btn-primary" onclick="cargar()">Actualizar</button></div></header>
<section class="grid lg:grid-cols-[380px_1fr] gap-6">
<div class="glass rounded-3xl p-6 h-fit"><h2 class="text-2xl font-black text-white mb-5">Nuevo usuario</h2><div class="space-y-4"><div><label class="label">Nombre</label><input id="nombre" class="input"></div><div><label class="label">Usuario</label><input id="usuario" class="input"></div><div><label class="label">Correo</label><input id="correo" class="input"></div><div><label class="label">Rol</label><select id="role" class="select"><option value="admin">Administrador</option><option value="taquilla">Taquilla</option><option value="validador">Validador</option></select></div><div><label class="label">Contraseña inicial</label><input id="password" type="password" class="input"></div><button class="btn btn-primary w-full" onclick="crearUsuario()">Crear usuario</button></div><div class="mt-7 border-t border-white/10 pt-5"><h3 class="text-xl font-black text-white mb-3">Cambiar mi contraseña</h3><input id="actual" type="password" class="input mb-3" placeholder="Contraseña actual"><input id="nueva" type="password" class="input mb-3" placeholder="Nueva contraseña"><button class="btn btn-soft w-full" onclick="cambiarMiPassword()">Cambiar mi contraseña</button></div></div>
<div class="glass rounded-3xl p-6"><h2 class="text-2xl font-black text-white mb-5">Usuarios registrados</h2><div class="table-wrap"><table><thead><tr><th>Usuario</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead><tbody id="tbody"></tbody></table></div></div>
</section>
</main>
<script>
const API='https://fiestaretro-api.onrender.com';let usuarios=[];let modalAction=null;
function esc(t){return String(t||'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'","&#039;")}
function badge(t,cls){return `<span class="badge ${cls}">${esc(t)}</span>`}
async function cargar(){const r=await fetch(`${API}/api/auth/users`);const d=await r.json();if(!d.success){alert(d.error);return}usuarios=d.users;render()}
function render(){tbody.innerHTML=usuarios.map(u=>`<tr><td><strong>${esc(u.usuario)}</strong><br><small>${esc(u.nombre)}</small></td><td>${esc(u.correo||'')}</td><td><select class="select" onchange="actualizar('${u.id}',{role:this.value})"><option value="admin" ${u.role==='admin'?'selected':''}>Administrador</option><option value="taquilla" ${u.role==='taquilla'?'selected':''}>Taquilla</option><option value="validador" ${u.role==='validador'?'selected':''}>Validador</option></select></td><td>${u.activo?badge('Activo','badge-green'):badge('Inactivo','badge-red')}</td><td><div class="flex gap-2 flex-wrap"><button class="btn btn-soft" onclick="abrirReset('${u.id}')">Reset contraseña</button><button class="btn ${u.activo?'btn-danger':'btn-primary'}" onclick="actualizar('${u.id}',{activo:${!u.activo}})">${u.activo?'Desactivar':'Activar'}</button></div></td></tr>`).join('')}
async function crearUsuario(){const body={nombre:nombre.value.trim(),usuario:usuario.value.trim(),correo:correo.value.trim(),role:role.value,password:password.value.trim()};if(!body.nombre||!body.usuario||!body.password){alert('Nombre, usuario y contraseña son obligatorios');return}const r=await fetch(`${API}/api/auth/users`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!d.success){alert(d.error);return}nombre.value='';usuario.value='';correo.value='';password.value='';await cargar()}
async function actualizar(id,body){const r=await fetch(`${API}/api/auth/users/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!d.success){alert(d.error);return}await cargar()}
function abrirReset(id){const u=usuarios.find(x=>x.id===id);modalAction=async()=>{const pass=document.getElementById('modalPass').value.trim();if(!pass){alert('Captura contraseña');return}const r=await fetch(`${API}/api/auth/users/${id}/reset-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pass})});const d=await r.json();if(!d.success){alert(d.error);return}cerrarModal();alert('Contraseña actualizada')};modalTitle.textContent=`Reset contraseña: ${u.usuario}`;modalBody.innerHTML='<input id="modalPass" class="input" style="color:white" type="password" placeholder="Nueva contraseña">';modal.style.display='flex'}
function cerrarModal(){modal.style.display='none';modalAction=null}
function guardarModal(){if(modalAction)modalAction()}
async function cambiarMiPassword(){const body={actual:actual.value.trim(),nueva:nueva.value.trim()};if(!body.actual||!body.nueva){alert('Captura contraseña actual y nueva');return}const r=await fetch(`${API}/api/auth/change-password`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!d.success){alert(d.error);return}actual.value='';nueva.value='';alert('Tu contraseña fue actualizada')}
cargar();
</script>
<script src="admin-nav.js"></script>
</body>
</html>
