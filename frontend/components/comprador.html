<div class="form-section">

    <div class="container-ex">

        <h2 class="section-title">
            Datos del comprador
        </h2>

        <p class="section-subtitle mt-4 text-slate-600">
            Estos datos se usarán para enviar la confirmación de compra.
        </p>

        <div class="form-card">

            <div class="form-grid">

                <div class="field">
                    <label>Nombre completo</label>
                    <input id="compradorNombre" type="text" placeholder="Nombre del comprador">
                </div>

                <div class="field">
                    <label>Correo electrónico</label>
                    <input id="compradorCorreo" type="email" placeholder="correo@email.com">
                </div>

                <div class="field">
                    <label>WhatsApp</label>
                    <input id="compradorTelefono" type="tel" placeholder="9210000000">
                </div>

            </div>

        </div>

    </div>

</div>
