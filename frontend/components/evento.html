<div class="evento-section" id="evento-section">

    <div class="container-ex">

        <h2 class="section-title">
            Información del evento
        </h2>

        <p class="section-subtitle mt-4">
            Consulta los datos principales antes de comprar tus boletos.
        </p>

        <div class="info-grid">

            <div class="info-card">
                <div class="info-icon">F</div>
                <span>Fecha</span>
                <strong data-evento-fecha></strong>
            </div>

            <div class="info-card">
                <div class="info-icon">H</div>
                <span>Hora</span>
                <strong data-evento-hora></strong>
            </div>

            <div class="info-card">
                <div class="info-icon">L</div>
                <span>Lugar</span>
                <strong data-evento-lugar></strong>
            </div>

            <div class="info-card">
                <div class="info-icon">$</div>
                <span>Desde</span>
                <strong data-precio-general></strong>
            </div>

        </div>

    </div>

</div>
