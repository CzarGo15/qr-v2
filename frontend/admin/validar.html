<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>EXELARIS | Control de Acceso</title>

<script src="https://unpkg.com/html5-qrcode"></script>
<script src="https://cdn.tailwindcss.com"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link
href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&display=swap"
rel="stylesheet">

<style>

*{
font-family:'Montserrat',sans-serif;
}

body{
background:
linear-gradient(
135deg,
#020617,
#111827,
#312e81
);
min-height:100vh;
}

.glass{
background:rgba(255,255,255,.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.08);
}

.neon{
text-shadow:
0 0 5px #ff00ff,
0 0 10px #ff00ff,
0 0 20px #ff00ff;
}

#reader{
overflow:hidden;
border-radius:20px;
}

</style>

</head>

<body>

<div class="container mx-auto p-4">

<div class="max-w-xl mx-auto">

<!-- SELECCION PERFIL -->

<div
id="pantallaPerfil"
class="glass rounded-3xl p-8">

<div class="text-center">

<div
class="w-24 h-24 mx-auto rounded-full bg-gradient-to-r from-fuchsia-500 to-cyan-400 flex items-center justify-center">

<span class="text-5xl font-black text-white">
X
</span>

</div>

<h1
class="text-white text-5xl font-black mt-5 neon">

EXELARIS

</h1>

<p
class="text-cyan-300 tracking-[6px] mt-2">

CONTROL DE ACCESO

</p>

</div>

<div class="mt-8 space-y-4">

<button
onclick="seleccionarPerfil('Administrador')"
class="w-full p-5 rounded-2xl bg-white font-bold">

Administrador

</button>

<button
onclick="seleccionarPerfil('Operador')"
class="w-full p-5 rounded-2xl bg-white font-bold">

Operador

</button>

<button
onclick="seleccionarPerfil('Validador 1')"
class="w-full p-5 rounded-2xl bg-white font-bold">

Validador 1

</button>

<button
onclick="seleccionarPerfil('Validador 2')"
class="w-full p-5 rounded-2xl bg-white font-bold">

Validador 2

</button>

<button
onclick="seleccionarPerfil('Validador 3')"
class="w-full p-5 rounded-2xl bg-white font-bold">

Validador 3

</button>

</div>

</div>

<!-- SCANNER -->

<div
id="pantallaScanner"
class="hidden">

<div class="glass rounded-3xl p-6">

<div class="text-center">

<h2
id="perfilActivo"
class="text-white text-3xl font-black">
</h2>

<p class="text-green-400 mt-2">
🟢 Sistema listo
</p>

</div>

<div class="mt-6 bg-white rounded-3xl p-2">

<div id="reader"></div>

</div>

<div
id="resultado"
class="hidden mt-6">
</div>

</div>

</div>

</div>

</div>

<script>

const API =
'https://fiestaretro-api.onrender.com';

let perfilSeleccionado = '';
let boletoActual = null;
let html5QrCode = null;
let scannerActivo = false;

function seleccionarPerfil(perfil){

perfilSeleccionado = perfil;

document.getElementById(
'perfilActivo'
).innerHTML = perfil;

document.getElementById(
'pantallaPerfil'
).classList.add('hidden');

document.getElementById(
'pantallaScanner'
).classList.remove('hidden');

iniciarScanner();

}

async function iniciarScanner(){

if(scannerActivo){
return;
}

scannerActivo = true;

html5QrCode =
new Html5Qrcode("reader");

await html5QrCode.start(

{
facingMode:"environment"
},

{
fps:15,
qrbox:250
},

async(decodedText)=>{

scannerActivo = false;

await html5QrCode.stop();

buscarBoleto(decodedText);

}

);

}

async function escanearSiguiente(){

document.getElementById(
'resultado'
).classList.add('hidden');

boletoActual = null;

await iniciarScanner();

}

async function buscarBoleto(uuid){

const respuesta =
await fetch(

`${API}/api/validar/buscar`,

{
method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
uuid
})
}

);

const data =
await respuesta.json();

const resultado =
document.getElementById(
'resultado'
);

resultado.classList.remove(
'hidden'
);

if(!data.success){

if(data.usado){

resultado.innerHTML = `

<div class="bg-red-600 rounded-3xl p-6 text-center">

<h2 class="text-4xl font-black">
🚫 BOLETO UTILIZADO
</h2>

<p class="mt-4">
${data.boleto.nombre}
</p>

<p>
${data.boleto.folio}
</p>

<p class="mt-2">
Validado por:
${data.boleto.validadoPor || '-'}
</p>

<button
onclick="escanearSiguiente()"
class="
mt-6
bg-black
px-8
py-4
rounded-2xl
font-bold">

ESCANEAR OTRO

</button>

</div>

`;

}else{

resultado.innerHTML = `

<div class="bg-red-600 rounded-3xl p-6 text-center">

<h2 class="text-4xl font-black">
❌ QR INVÁLIDO
</h2>

<p class="mt-4">
${data.error}
</p>

<button
onclick="escanearSiguiente()"
class="
mt-6
bg-black
px-8
py-4
rounded-2xl
font-bold">

ESCANEAR OTRO

</button>

</div>

`;

}

return;

}

boletoActual =
data.boleto;

resultado.innerHTML = `

<div class="bg-green-600 rounded-3xl p-6 text-center">

<h2 class="text-4xl font-black">
✅ BOLETO VÁLIDO
</h2>

<p class="mt-4">
<strong>${boletoActual.nombre}</strong>
</p>

<p>
${boletoActual.folio}
</p>

<p>
${boletoActual.tipo}
</p>

<button

onclick="confirmarAcceso()"

class="
mt-6
w-full
bg-black
text-white
p-4
rounded-2xl
font-black">

CONFIRMAR ACCESO

</button>

</div>

`;

}

async function confirmarAcceso(){

const respuesta =
await fetch(

`${API}/api/validar/confirmar`,

{
method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({

uuid:
boletoActual.uuid,

validador:
perfilSeleccionado

})
}

);

const data =
await respuesta.json();

if(!data.success){

alert(data.error);

return;

}

document.getElementById(
'resultado'
).innerHTML = `

<div class="bg-green-700 rounded-3xl p-8 text-center">

<h2 class="text-5xl font-black">
🎉 ACCESO AUTORIZADO
</h2>

<p class="mt-4">
Validado por:
<strong>
${perfilSeleccionado}
</strong>
</p>

<button

onclick="escanearSiguiente()"

class="
mt-8
bg-black
px-8
py-4
rounded-2xl
font-bold">

ESCANEAR SIGUIENTE

</button>

</div>

`;

}

</script>

</body>
</html>
