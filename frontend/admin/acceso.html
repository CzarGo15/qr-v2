<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>EXELARIS | Acceso evento</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/html5-qrcode"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
body{font-family:Poppins,sans-serif;background:#020617;color:#E5E7EB}
.glass{background:rgba(15,23,42,.88);border:1px solid rgba(255,255,255,.1);box-shadow:0 24px 80px rgba(0,0,0,.35);backdrop-filter:blur(18px)}
.input{width:100%;background:#0F172A;border:1px solid rgba(255,255,255,.12);color:white;outline:none;border-radius:18px;padding:14px 16px;font-weight:700}
.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:16px;padding:12px 16px;font-weight:900;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,#16A34A,#22C55E);color:white}
.btn-soft{background:rgba(255,255,255,.08);color:#E5E7EB;border:1px solid rgba(255,255,255,.1)}
.card{border-radius:28px;padding:28px}.ok{background:#16A34A;color:white}.warn{background:#F59E0B;color:#111827}.bad{background:#DC2626;color:white}
#reader{border-radius:24px;overflow:hidden;background:white}
</style>
</head>
<body>
<main class="max-w-5xl mx-auto px-5 py-8">
<header class="mb-8 flex flex-col lg:flex-row lg:items-center lg:justify-between gap-5">
<div>
<div class="text-sm tracking-[.28em] text-green-300 font-bold">EXELARIS ACCESO</div>
<h1 class="text-4xl lg:text-5xl font-black text-white mt-2">Validar entrada</h1>
<p class="text-slate-400 mt-3">Escanea el QR en la puerta del evento.</p>
</div>
<div class="flex gap-3 flex-wrap">
<a class="btn btn-soft" href="lotes.html">Lotes físicos</a>
<a class="btn btn-soft" href="compras.html">Compras</a>
</div>
</header>

<section class="grid lg:grid-cols-[420px_1fr] gap-6">
<div class="glass rounded-3xl p-6">
<h2 class="text-2xl font-black mb-4">Scanner</h2>
<div id="reader"></div>
<div class="mt-4 flex gap-3 flex-wrap">
<button class="btn btn-primary" onclick="iniciarCamara()">Iniciar cámara</button>
<button class="btn btn-soft" onclick="detenerCamara()">Detener</button>
</div>
<div class="mt-6">
<input id="codigo" class="input" placeholder="UUID o folio">
<button class="btn btn-primary w-full mt-3" onclick="buscar()">Buscar boleto</button>
</div>
<div class="mt-4">
<input id="validador" class="input" value="Validador 1" placeholder="Nombre del validador">
</div>
</div>

<div class="glass rounded-3xl p-6">
<h2 class="text-2xl font-black mb-4">Resultado</h2>
<div id="resultado" class="text-slate-400 font-bold">Escanea o captura un código.</div>
</div>
</section>
</main>

<script>
const API='https://fiestaretro-api.onrender.com';
let scanner=null;
let ultimo=null;
let bloqueado=false;

function esc(t){
return String(t||'')
.replaceAll('&','&amp;')
.replaceAll('<','&lt;')
.replaceAll('>','&gt;')
.replaceAll('"','&quot;')
.replaceAll("'","&#039;");
}

async function iniciarCamara(){
if(scanner){
return;
}

scanner=new Html5Qrcode('reader');

await scanner.start(
{facingMode:'environment'},
{fps:10,qrbox:{width:250,height:250}},
txt=>{
if(bloqueado){
return;
}
bloqueado=true;
document.getElementById('codigo').value=txt;
buscar().finally(()=>setTimeout(()=>bloqueado=false,1800));
},
()=>{}
);
}

async function detenerCamara(){
if(scanner){
await scanner.stop().catch(()=>{});
scanner.clear();
scanner=null;
}
}

async function buscar(){
const codigo=document.getElementById('codigo').value.trim();

if(!codigo){
alert('Captura código');
return;
}

const out=document.getElementById('resultado');
out.innerHTML='Buscando...';

try{
const r=await fetch(`${API}/api/acceso/buscar`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({codigo})
});

const d=await r.json();

if(!d.success){
throw new Error(d.error);
}

ultimo=d;

const b=d.boleto;
const a=d.acceso;
const cls=a.permitido?'ok':'warn';

out.innerHTML=`
<div class="card ${cls}">
<div class="text-4xl font-black">${a.permitido?'VÁLIDO':'REVISAR'}</div>
<div class="text-xl font-black mt-3">${esc(a.mensaje)}</div>

<div class="mt-4 text-lg">Folio: <strong>${esc(b.folio)}</strong></div>
<div>Tipo: <strong>${esc(b.categoriaNombre||b.tipo)}</strong></div>
<div>Nombre: <strong>${esc(b.nombre)}</strong></div>

${b.loteId?`<div>Lote: <strong>${esc(b.loteId)}</strong></div>`:''}
${b.puntoVenta?`<div>Punto de venta: <strong>${esc(b.puntoVenta)}</strong></div>`:''}
${b.responsable?`<div>Responsable: <strong>${esc(b.responsable)}</strong></div>`:''}
${b.grupoId?`<div>Grupo: <strong>${esc(b.grupoId)}</strong></div>`:''}

${a.permitido?`<button class="btn btn-primary mt-6 w-full" onclick="confirmar()">Confirmar acceso</button>`:''}
</div>
`;

}catch(e){
out.innerHTML=`
<div class="card bad">
<div class="text-4xl font-black">NO VÁLIDO</div>
<div class="text-xl mt-3">${esc(e.message)}</div>
</div>
`;
}
}

async function confirmar(){
if(!ultimo?.boleto){
return;
}

try{
const codigo=ultimo.boleto.uuid;
const validadoPor=document.getElementById('validador').value.trim()||'Validador';

const r=await fetch(`${API}/api/acceso/confirmar`,{
method:'POST',
headers:{'Content-Type':'application/json'},
body:JSON.stringify({
codigo,
validadoPor,
puerta:'Acceso principal'
})
});

const d=await r.json();

if(!d.success){
throw new Error(d.error);
}

document.getElementById('resultado').innerHTML=`
<div class="card ok">
<div class="text-5xl font-black">ACCESO CONFIRMADO</div>
<div class="text-xl mt-4">${esc(d.boleto.folio)} · ${esc(d.boleto.categoriaNombre)}</div>
${d.boleto.puntoVenta?`<div class="text-lg mt-2">Punto de venta: <strong>${esc(d.boleto.puntoVenta)}</strong></div>`:''}
</div>
`;

document.getElementById('codigo').value='';

}catch(e){
document.getElementById('resultado').innerHTML=`
<div class="card bad">
<div class="text-4xl font-black">ERROR</div>
<div class="text-xl mt-3">${esc(e.message)}</div>
</div>
`;
}
}
</script>
</body>
</html>
