<div class="form-section">

    <div class="container-ex">

        <h2 class="section-title">
            Asistentes
        </h2>

        <p class="section-subtitle mt-4 text-slate-600">
            Si compras varios boletos, puedes asignar un nombre diferente a cada boleto.
        </p>

        <div class="form-card">

            <label class="buyer-assistant-option">
                <input
                    id="yoSoyAsistente"
                    type="checkbox"
                    checked
                >
                <span>
                    Yo usaré el primer boleto
                    <small>
                        El primer boleto quedará a nombre del comprador.
                    </small>
                </span>
            </label>

            <div id="asistentesLista" class="asistentes-list">
                <p class="text-slate-500 font-semibold">
                    Selecciona boletos para capturar asistentes.
                </p>
            </div>

        </div>

    </div>

</div>
